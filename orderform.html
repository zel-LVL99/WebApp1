<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="orderform">
  <div class="page-wrapper">
    <div class="form-container">
      <div class="form-header">
        <span class="eyebrow">Checkout</span>
        <h1>Complete your order</h1>
        <p>Fill in your details below and we'll prepare your selected item for delivery.</p>
      </div>

      <div id="selectedItem" class="selected-item hidden"></div>

      <form id="orderForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required />
          </div>

          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" placeholder="Enter your address" required></textarea>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="contactNumber">Contact Number</label>
            <input type="tel" id="contactNumber" name="contactNumber" placeholder="e.g. 0912-345-6789" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod" name="paymentMethod" required>
            <option value="">Choose payment method</option>
            <option value="online">Online Payment</option>
            <option value="cod">Cash on Delivery</option>
          </select>
        </div>

        <button type="submit" class="submit-button">Submit Order</button>
      </form>

      <p class="note">If you clicked "Buy Now" from the homepage, any selected item and quantity appear above.</p>
    </div>
  </div>

  <div id="orderDialog" class="order-dialog hidden">
    <div class="order-dialog-card">
      <p class="dialog-title">Thank you for your purchase</p>
      <p class="dialog-text">Your order has been received and will be processed shortly.</p>
      <button id="closeDialog" type="button" class="action-button">Continue</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const hygiene = Number(params.get('hygiene')) || 0;
    const powerbank = Number(params.get('powerbank')) || 0;
    const solar = Number(params.get('solar')) || 0;

    const totalItems = Number(params.get('totalItems')) || 0;
    const deliveryFee = params.get('deliveryFee') || "0.00";
    const totalAmount = params.get('totalAmount') || "0.00";

    const selectedItem = document.getElementById('selectedItem');

    if (totalItems > 0) {
      selectedItem.innerHTML = `
        <strong>Order Summary:</strong><br>
        Hygiene Kit: ${hygiene}<br>
        Powerbank: ${powerbank}<br>
        Solar Panel: ${solar}<br><br>
        Total Items: ${totalItems}<br>
        Delivery Fee: ₱${deliveryFee}<br>
        Total Amount: ₱${totalAmount}
      `;
      selectedItem.classList.remove('hidden');
      selectedItem.style.display = 'block';
    }

    const orderForm = document.getElementById('orderForm');
    const orderDialog = document.getElementById('orderDialog');
    const closeDialog = document.getElementById('closeDialog');

    orderForm.addEventListener('submit', event => {
      event.preventDefault();
      orderDialog.classList.remove('hidden');
    });

    closeDialog.addEventListener('click', () => {
      orderDialog.classList.add('hidden');
      orderForm.reset();
      window.location.href = 'homepage.html';
    });

    orderDialog.addEventListener('click', event => {
      if (event.target === orderDialog) {
        orderDialog.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
