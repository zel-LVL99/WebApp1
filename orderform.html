<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="orderform">
  <div class="page-wrapper">
    <div class="form-container">
      <div class="form-header">
        <span class="eyebrow">Checkout</span>
        <h1>Complete your order</h1>
        <p>Fill in your details below and we'll prepare your selected item for delivery.</p>
      </div>
      <div id="selectedItem" class="selected-item hidden"></div>
      <form id="orderForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required />
          </div>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" placeholder="Enter your address" required></textarea>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="contactNumber">Contact Number</label>
            <input type="tel" id="contactNumber" name="contactNumber" placeholder="e.g. 123-456-7890" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label for="paymentMethod">Payment Method</label>
          <select id="paymentMethod" name="paymentMethod" required>
            <option value="">Choose payment method</option>
            <option value="online">Online Payment</option>
            <option value="cod">Cash on Delivery</option>
          </select>
        </div>
        <button type="submit" class="submit-button">Submit Order</button>
      </form>
      <p class="note">If you clicked "Buy Now" from the homepage, any selected item and quantity appear above.</p>
    </div>
  </div>
  <div id="orderDialog" class="order-dialog hidden">
    <div class="order-dialog-card">
      <p class="dialog-title">Thank you for your purchase</p>
      <p class="dialog-text">Your order has been received and will be processed shortly.</p>
      <button id="closeDialog" type="button" class="action-button">Continue</button>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const item = params.get('item');
    const qty = Math.max(1, Number(params.get('qty')) || 1);
    if (item) {
      const itemLabel = {
        hygiene: 'Hygiene Kit',
        powerbank: 'Powerbank',
        solar: 'Solar Panel'
      }[item] || item;
      const itemPrices = {
        hygiene: 9.99,
        powerbank: 19.99,
        solar: 29.99
      };
      const unitPrice = itemPrices[item] || 0;
      const deliveryFee = qty > 0 ? 4.99 : 0;
      const subtotal = unitPrice * qty;
      const totalAmount = (subtotal + deliveryFee).toFixed(2);
      const selectedItem = document.getElementById('selectedItem');
      selectedItem.textContent = `Selected item: ${itemLabel} — Quantity: ${qty} — Delivery fee: $${deliveryFee.toFixed(2)} — Total amount: $${totalAmount}`;
      selectedItem.style.display = 'block';
    }

    const orderForm = document.getElementById('orderForm');
    const orderDialog = document.getElementById('orderDialog');
    const closeDialog = document.getElementById('closeDialog');

    if (orderForm) {
      orderForm.addEventListener('submit', event => {
        event.preventDefault();
        orderDialog.classList.remove('hidden');
      });
    }

    if (closeDialog) {
      closeDialog.addEventListener('click', () => {
        orderDialog.classList.add('hidden');
      });
    }

    if (orderDialog) {
      orderDialog.addEventListener('click', event => {
        if (event.target === orderDialog) {
          orderDialog.classList.add('hidden');
        }
      });
    }
  </script>
</body>
</html>
